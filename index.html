<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finans Pro">
  <meta name="theme-color" content="#f7f8fb">
  <title>Finans Pro</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --bg-end: #edf2ef;
      --surface: #ffffff;
      --surface-soft: #f3f6f8;
      --surface-strong: #eef2f5;
      --ink: #111419;
      --ink-2: #252a32;
      --muted: #626d7c;
      --faint: #9aa4b2;
      --line: rgba(20, 24, 32, 0.10);
      --line-strong: rgba(20, 24, 32, 0.16);
      --gold: #b88a2a;
      --gold-soft: #f7edcf;
      --green: #0f9f6e;
      --green-soft: #e2f7ef;
      --red: #c93445;
      --red-soft: #fde8eb;
      --blue: #174ea6;
      --shadow: 0 18px 50px rgba(27, 34, 45, 0.10);
      --shadow-soft: 0 6px 18px rgba(27, 34, 45, 0.055);
      --radius: 18px;
      --tab-height: 66px;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0c0d10;
      --bg-end: #171916;
      --surface: #171a20;
      --surface-soft: #20242b;
      --surface-strong: #272c34;
      --ink: #f3f5f7;
      --ink-2: #d9dee5;
      --muted: #a3adba;
      --faint: #717b89;
      --line: rgba(255, 255, 255, 0.10);
      --line-strong: rgba(255, 255, 255, 0.18);
      --gold: #d4aa48;
      --gold-soft: #332811;
      --green: #31c48d;
      --green-soft: #102a21;
      --red: #ee6572;
      --red-soft: #34181d;
      --blue: #72a6ff;
      --shadow: 0 18px 52px rgba(0, 0, 0, 0.42);
      --shadow-soft: 0 8px 26px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body,
    #root {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(180deg, var(--bg) 0%, var(--bg) 46%, var(--bg-end) 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    input {
      min-width: 0;
      font-size: 16px;
    }

    ::-webkit-scrollbar {
      display: none;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulseCheck {
      0% { transform: scale(0.88); }
      65% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      width: 100%;
      padding: 10px 16px 9px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .brand-title {
      display: flex;
      align-items: baseline;
      gap: 6px;
      line-height: 1;
    }

    .brand-title strong {
      font-size: 19px;
      font-weight: 680;
      letter-spacing: 0;
    }

    .brand-title span {
      color: var(--gold);
      font-size: 19px;
      font-weight: 680;
    }

    .top-sub {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 5px;
      color: var(--muted);
      font-size: 10.5px;
      font-weight: 450;
    }

    .privacy-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--green) 14%, transparent);
      flex: 0 0 auto;
    }

    .theme-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--ink);
      background: var(--surface-soft);
      box-shadow: var(--shadow-soft);
      font-size: 17px;
    }

    .main {
      width: 100%;
      max-width: 452px;
      margin: 0 auto;
      padding: 10px 12px calc(var(--tab-height) + 18px + env(safe-area-inset-bottom));
      animation: fadeUp 0.28s ease both;
    }

    .hero {
      position: relative;
      overflow: hidden;
      min-height: 196px;
      padding: 19px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 26px;
      background:
        linear-gradient(145deg, #111419 0%, #252a32 58%, #6f541e 130%);
      color: #fff;
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 34%;
      background:
        linear-gradient(180deg, transparent 0%, rgba(255, 255, 255, 0.08) 100%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .hero h2 {
      margin-top: 10px;
      max-width: 270px;
      font-size: 25px;
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 850;
    }

    .hero p {
      max-width: 300px;
      margin-top: 10px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 520;
    }

    .dial {
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background:
        conic-gradient(#ffffff calc(var(--p) * 1%), rgba(255, 255, 255, 0.20) 0);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .dial-inner {
      width: 60px;
      height: 60px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(17, 20, 25, 0.72);
      color: #fff;
      font-size: 14px;
      font-weight: 850;
    }

    .hero-metrics {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-top: 17px;
    }

    .hero-metric {
      min-height: 58px;
      padding: 10px 9px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.10);
    }

    .hero-metric span,
    .metric-card span,
    .payment-label,
    .micro-label {
      display: block;
      color: var(--faint);
      font-size: 8.5px;
      font-weight: 520;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .hero-metric span {
      color: rgba(255, 255, 255, 0.55);
    }

    .hero-metric strong {
      display: block;
      margin-top: 5px;
      color: #fff;
      font-size: 15px;
      line-height: 1.12;
      font-weight: 850;
      word-break: break-word;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
      margin-top: 11px;
    }

    .metric-card {
      min-height: 78px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 11px 10px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: var(--shadow-soft);
    }

    .metric-card strong {
      display: block;
      margin-top: 6px;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.08;
      font-weight: 850;
      word-break: break-word;
    }

    .metric-card small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 650;
    }

    .brand-rail {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(82px, 1fr);
      gap: 8px;
      margin-top: 11px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .brand-chip {
      min-height: 66px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow-soft);
      text-align: center;
    }

    .brand-chip > span:last-child {
      max-width: 76px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.05;
      font-weight: 800;
    }

    .brand-mark {
      position: relative;
      flex: 0 0 auto;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 28px;
      overflow: hidden;
      border-radius: 8px;
      color: #fff;
      box-shadow:
        inset 0 -5px 10px rgba(0, 0, 0, 0.14),
        0 6px 14px rgba(0, 0, 0, 0.08);
    }

    .brand-mark.has-logo {
      padding: 4px;
      border: 1px solid color-mix(in srgb, var(--line-strong) 80%, transparent);
      background: #fff;
      color: var(--ink);
      box-shadow: 0 6px 14px rgba(27, 34, 45, 0.07);
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: 4px;
      height: 1px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.26;
    }

    .brand-mark.has-logo::after {
      display: none;
    }

    .brand-mark.xl {
      width: 62px;
      height: 38px;
      border-radius: 10px;
    }

    .brand-mark.md {
      width: 48px;
      height: 28px;
      border-radius: 8px;
    }

    .brand-mark.sm {
      width: 42px;
      height: 26px;
      border-radius: 8px;
    }

    .brand-mark.xs {
      width: 34px;
      height: 24px;
      border-radius: 7px;
    }

    .brand-main {
      position: relative;
      z-index: 1;
      max-width: 44px;
      font-size: 8.8px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      text-align: center;
      white-space: nowrap;
    }

    .brand-logo {
      position: relative;
      z-index: 2;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand-mark.has-logo .brand-main,
    .brand-mark.has-logo .brand-sub {
      display: none;
    }

    .brand-mark.xl .brand-main {
      max-width: 58px;
      font-size: 10.5px;
    }

    .brand-mark.sm .brand-main {
      max-width: 44px;
      font-size: 9.5px;
    }

    .brand-mark.xs .brand-main {
      max-width: 30px;
      font-size: 8px;
    }

    .brand-sub {
      position: relative;
      z-index: 1;
      margin-top: 2px;
      font-size: 6px;
      line-height: 1;
      font-weight: 800;
      opacity: 0.78;
      text-transform: uppercase;
    }

    .brand-mark.sm .brand-sub,
    .brand-mark.xs .brand-sub {
      display: none;
    }

    .brand-akbank { background: #e30613; }
    .brand-garanti { background: linear-gradient(145deg, #007a4d 0%, #005f3b 100%); }
    .brand-isbank { background: #0b3a82; }
    .brand-eminevim { background: linear-gradient(145deg, #008457 0%, #006643 100%); }
    .brand-albaraka { background: #00a19a; }
    .brand-sgk { background: linear-gradient(145deg, #e31f26 0%, #2451a3 100%); }
    .brand-health { background: linear-gradient(145deg, #13a37f 0%, #0a7563 100%); }
    .brand-enpara { background: #7623bf; }
    .brand-ziraat { background: #d71920; }
    .brand-yapikredi { background: #004990; }
    .brand-halkbank { background: #006bb6; }
    .brand-vakif { background: #e0a313; color: #16191f; }
    .brand-qnb { background: #5e2a84; }
    .brand-teb { background: #00a650; }
    .brand-deniz { background: #d71920; }
    .brand-ing { background: #ff6200; }
    .brand-generic { background: linear-gradient(145deg, #303741 0%, #626b78 100%); }
    .brand-gold { background: linear-gradient(145deg, #c39831 0%, #7b5b18 100%); }
    .brand-utility { background: linear-gradient(145deg, #0786a0 0%, #155e75 100%); }
    .brand-home { background: linear-gradient(145deg, #334155 0%, #111827 100%); }
    .brand-residence { background: linear-gradient(145deg, #334155 0%, #111827 100%); }
    .brand-mark.brand-home .brand-main,
    .brand-mark.brand-residence .brand-main,
    .brand-mark.brand-home .brand-sub,
    .brand-mark.brand-residence .brand-sub {
      display: none;
    }
    .brand-mark.brand-home::before,
    .brand-mark.brand-residence::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 43%;
      z-index: 1;
      width: 21px;
      height: 21px;
      border-left: 2px solid currentColor;
      border-top: 2px solid currentColor;
      border-radius: 3px 0 0 0;
      transform: translate(-50%, -50%) rotate(45deg);
      background: transparent;
    }
    .brand-mark.brand-home::after,
    .brand-mark.brand-residence::after {
      display: block;
      left: 50%;
      right: auto;
      bottom: 5px;
      width: 22px;
      height: 15px;
      border: 2px solid currentColor;
      border-top: 0;
      border-radius: 2px 2px 4px 4px;
      background:
        linear-gradient(currentColor, currentColor) center bottom / 5px 8px no-repeat;
      opacity: 1;
      transform: translateX(-50%);
    }
    .brand-mark.brand-garanti .brand-main,
    .brand-mark.brand-albaraka .brand-main,
    .brand-mark.brand-eminevim .brand-main,
    .brand-mark.brand-health .brand-main {
      font-size: 8px;
    }
    .brand-mark.brand-garanti::before {
      content: "";
      position: absolute;
      top: 4px;
      right: 5px;
      width: 5px;
      height: 5px;
      border-radius: 7px 7px 7px 1px;
      background: #7cc242;
      transform: rotate(-28deg);
      opacity: 0.9;
    }

    .priority-card,
    .chart-card,
    .toolbar-card,
    .summary-strip,
    .add-panel,
    .saving-hero,
    .saving-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-soft);
    }

    .priority-card {
      margin-top: 12px;
      padding: 14px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.2;
      font-weight: 560;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .section-title strong {
      color: var(--ink);
      font-size: 10.5px;
      font-weight: 560;
      text-transform: none;
    }

    .priority-list {
      display: grid;
      gap: 8px;
    }

    .priority-item {
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px;
      border-radius: 14px;
      background: var(--surface-soft);
    }

    .priority-item h4 {
      display: -webkit-box;
      overflow: hidden;
      color: var(--ink);
      font-size: 13.5px;
      line-height: 1.18;
      font-weight: 800;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .priority-item p {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    .priority-item strong {
      margin-left: auto;
      color: var(--red);
      font-size: 13px;
      font-weight: 850;
      white-space: nowrap;
    }

    .chart-card {
      margin-top: 12px;
      padding: 14px;
    }

    .bars {
      display: flex;
      align-items: end;
      gap: 8px;
      height: 92px;
      padding-top: 8px;
    }

    .bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: end;
      gap: 7px;
      min-width: 0;
    }

    .bar {
      width: 100%;
      min-height: 5px;
      border-radius: 7px 7px 3px 3px;
      background: var(--surface-strong);
      overflow: hidden;
    }

    .bar.active {
      background: linear-gradient(180deg, var(--ink) 0%, var(--gold) 100%);
    }

    .bar-label {
      color: var(--faint);
      font-size: 10.5px;
      font-weight: 800;
    }

    .toolbar-card {
      display: grid;
      grid-template-columns: 34px 1fr 34px;
      align-items: center;
      gap: 8px;
      padding: 8px;
    }

    .month-center {
      text-align: center;
      line-height: 1.1;
    }

    .month-center strong {
      display: block;
      font-size: 14px;
      font-weight: 560;
    }

    .month-center span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 420;
    }

    .nav-btn {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 19px;
      line-height: 1;
      font-weight: 700;
    }

    .month-strip {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 5px;
      margin-top: 8px;
    }

    .month-chip {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--surface);
      color: var(--faint);
      font-size: 9px;
      font-weight: 520;
    }

    .month-chip.has-data {
      border-color: color-mix(in srgb, var(--gold) 58%, var(--line));
      color: var(--gold);
    }

    .month-chip.active {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--surface);
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      margin-top: 8px;
      overflow: hidden;
    }

    .summary-cell {
      min-height: 54px;
      padding: 8px 4px;
      background: var(--surface);
      text-align: center;
    }

    .summary-cell + .summary-cell {
      border-left: 1px solid var(--line);
    }

    .summary-cell span {
      display: block;
      color: var(--faint);
      font-size: 7.8px;
      font-weight: 520;
      text-transform: uppercase;
    }

    .summary-cell strong {
      display: block;
      margin-top: 5px;
      color: var(--ink);
      font-size: 11.2px;
      line-height: 1.08;
      font-weight: 540;
      word-break: break-word;
    }

    .summary-single {
      grid-template-columns: 1fr;
    }

    .summary-single .summary-cell {
      min-height: 68px;
      padding: 11px 12px;
      text-align: left;
    }

    .summary-single .summary-cell strong {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 560;
    }

    .summary-cell small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.2;
      font-weight: 430;
    }

    .payment-section {
      margin-top: 11px;
    }

    .payment-grid {
      display: grid;
      gap: 7px;
    }

    .payment-card {
      --brand: var(--gold);
      height: 124px;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 7px;
      overflow: hidden;
      padding: 9px;
      border: 1px solid color-mix(in srgb, var(--line) 78%, transparent);
      border-top: 2px solid var(--red);
      border-radius: 14px;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--red-soft) 34%, var(--surface)) 0%, var(--surface) 40%);
      box-shadow: 0 9px 24px rgba(27, 34, 45, 0.065);
    }

    .payment-card.is-paid {
      opacity: 0.76;
      border-top-color: var(--green);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--green-soft) 50%, var(--surface)) 0%, var(--surface) 64%);
    }

    .payment-top,
    .payment-bottom,
    .payment-middle {
      min-width: 0;
    }

    .payment-top {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .payment-title {
      min-width: 0;
      flex: 1;
    }

    .payment-title h3 {
      display: -webkit-box;
      overflow: hidden;
      color: var(--ink);
      font-size: 11.4px;
      line-height: 1.14;
      font-weight: 520;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .payment-title p {
      display: -webkit-box;
      overflow: hidden;
      margin-top: 2px;
      color: var(--muted);

</head>
<body>
  <div id="root"></div>
  <script>
    (function () {
      "use strict";

      var root = document.getElementById("root");
      var now = new Date();
      var MONTHS = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
      var M3 = ["Oca", "Şub", "Mar", "Nis", "May", "Haz", "Tem", "Ağu", "Eyl", "Eki", "Kas", "Ara"];
      var ADV = { avgIncome: 150000, cashAdvance: 250000, cashAdvanceRate: 0.0425 };
      var KNOWN_BRANDS = ["Akbank", "Garanti BBVA", "Emin Evim", "Albaraka Türk", "Türkiye İş Bankası", "Enpara", "Rezidans", "SGK", "Sağlık Sigortası"];

      var storage = {
        get: function (key) {
          try {
            return JSON.parse(localStorage.getItem(key));
          } catch (err) {
            return null;
          }
        },
        set: function (key, value) {
          try {
            localStorage.setItem(key, JSON.stringify(value));
          } catch (err) {}
        }
      };

      var state = {
        dark: storage.get("dark-mode") === true,
        tab: "expenses",
        month: now.getMonth(),
        year: now.getFullYear(),
        oneTime: storage.get("fp-onetime") || {},
        recurring: storage.get("fp-recurring"),
        paid: storage.get("fp-paid") || {},
        addOpen: false,
        editKey: null,
        personalDebts: storage.get("fp-person-debts"),
        debtAddOpen: false,
        debtAction: {},
        debtEditKey: null
      };

      if (!state.recurring) {
        state.recurring = seedRecurring();
        storage.set("fp-recurring", state.recurring);
      }

      state.recurring = ensureRequiredPayments(state.recurring);
      storage.set("fp-recurring", state.recurring);

      if (!state.personalDebts) {
        state.personalDebts = seedPersonalDebts();
        storage.set("fp-person-debts", state.personalDebts);
      }

      function seedRecurring() {
        var sm = now.getMonth();
        var sy = now.getFullYear();
        var n = 0;
        function id() {
          n += 1;
          return Date.now() + n;
        }
        function mk(name, total, amount, day) {
          return {
            id: id(),
            name: name,
            amount: amount,
            total: total,
            day: day,
            startMonth: sm,
            startYear: sy,
            endMonth: 11,
            endYear: sy + 8
          };
        }
        return [
          mk("Akbank 2 Kredi", 377813, 29110, 3),
          mk("Akbank 1 Kredi", 811071, 30000, 3),
          mk("Garanti Kredi", 410476, 35200, 7),
          mk("İş Bankası Kredi", 79000, 15800, 16),
          mk("Albaraka Türk Kredi", 50000, 12500, 9),
          mk("Akbank Nakit Hesap", 210000, 25000, 3),
          mk("Enpara Nakit Avans", 59000, 10000, 20),
          mk("Akbank Kredi Kartı", 85000, 12000, 23),
          mk("Garanti Kredi Kartı", 260000, 30000, 5),
          mk("Enpara Kredi Kartı", 71250, 15000, 10),
          mk("Özüm Kredi Kartı", null, 7500, 5),
          mk("Garanti Bankası Kart Troy", null, 5000, 18)
        ];
      }

      function ensureRequiredPayments(list) {
        var next = (list || []).slice();
        var june2026 = { startMonth: 5, startYear: 2026 };
        function upsert(match, patcher) {
          var index = next.findIndex(function (item) {
            return match(normalizeText(item.name), item);
          });
          var current = index > -1 ? next[index] : { id: Date.now() + next.length + 5000 };
          var patch = typeof patcher === "function" ? patcher(current) : patcher;
          var merged = Object.assign({}, current, patch);
          if (index > -1) next[index] = merged;
          else next.push(merged);
        }
        function updateMatches(match, patcher) {
          next = next.map(function (item) {
            if (!match(normalizeText(item.name), item)) return item;
            var patch = typeof patcher === "function" ? patcher(item) : patcher;
            return Object.assign({}, item, patch);
          });
        }

        upsert(function (n, item) {
          return /akbank/.test(n) && !/kart|nakit|avans|hesap/.test(n) &&
            (/konut|akbank 1|buyuk|buyuk kredi/.test(n) || Number(item.total || 0) >= 400000 || Number(item.amount || 0) === 30000);
        }, function (item) {
          return {
            name: "Akbank 1 Kredi",
            amount: Number(item.amount) || 30000,
            total: 811071,
            day: Number(item.day) || 3,
            startMonth: item.startMonth == null ? june2026.startMonth : item.startMonth,
            startYear: item.startYear || june2026.startYear,
            endMonth: item.endMonth == null ? 11 : item.endMonth,
            endYear: item.endYear || 2034
          };
        });
        upsert(function (n, item) {
          return /akbank/.test(n) && !/kart|nakit|avans|hesap|konut/.test(n) &&
            (/akbank 2|orta|akbank kredi/.test(n) || (Number(item.amount || 0) === 29110 && Number(item.total || 0) < 500000));
        }, function (item) {
          return {
            name: "Akbank 2 Kredi",
            amount: Number(item.amount) || 29110,
            total: 377813,
            day: Number(item.day) || 3,
            startMonth: item.startMonth == null ? june2026.startMonth : item.startMonth,
            startYear: item.startYear || june2026.startYear,
            endMonth: item.endMonth == null ? 11 : item.endMonth,
            endYear: item.endYear || 2034
          };
        });
        upsert(function (n) { return /garanti/.test(n) && !/kart|troy|ozum/.test(n); }, function (item) {
          return {
            name: "Garanti Kredi",
            amount: Number(item.amount) || 35200,
            total: 410476,
            day: Number(item.day) || 7,
            startMonth: item.startMonth == null ? june2026.startMonth : item.startMonth,
            startYear: item.startYear || june2026.startYear,
            endMonth: item.endMonth == null ? 11 : item.endMonth,
            endYear: item.endYear || 2034
          };
        });
        updateMatches(function (n) { return /emin\s*evim|eminevim/.test(n); }, { day: 28 });

        upsert(function (n) { return /albarak/.test(n); }, {
          name: "Albaraka Türk Kredi",
          amount: 12500,
          total: 50000,
          day: 9,
          startMonth: june2026.startMonth,
          startYear: june2026.startYear,
          endMonth: 8,
          endYear: 2026
        });
        upsert(function (n) { return /enpara/.test(n) && /kart/.test(n); }, function (item) {
          return {
            name: "Enpara Kredi Kartı",
            amount: 15000,
            total: item.total == null ? null : Number(item.total) || null,
            day: 10,
            startMonth: item.startMonth == null ? june2026.startMonth : item.startMonth,
            startYear: item.startYear || june2026.startYear,
            endMonth: item.endMonth == null ? 11 : item.endMonth,
            endYear: item.endYear || 2034
          };
        });
        upsert(function (n) { return /ozum/.test(n) && /kart/.test(n); }, {
          name: "Özüm Kredi Kartı",
          amount: 7500,
          total: null,
          day: 5,
          startMonth: june2026.startMonth,
          startYear: june2026.startYear,
          endMonth: 11,
          endYear: 2034
        });
        upsert(function (n) { return /garanti/.test(n) && /troy/.test(n); }, {
          name: "Garanti Bankası Kart Troy",
          amount: 5000,
          total: null,
          day: 18,
          startMonth: june2026.startMonth,
          startYear: june2026.startYear,
          endMonth: 11,
          endYear: 2034
        });
        return next;
      }

      function seedPersonalDebts() {
        var seen = {};
        var debts = [];
        (state.recurring || []).forEach(function (item) {
          if (!isPersonalDebtName(item.name)) return;
          var key = normalizeText(item.name);
          if (seen[key]) return;
          seen[key] = true;
          debts.push({
            id: Date.now() + debts.length + 100,
            name: item.name,
            transactions: [
              { id: Date.now() + debts.length + 200, type: "borrow", amount: Number(item.total || item.amount || 0), date: new Date().toISOString() }
            ]
          });
        });
        if (!seen.murat) {
          debts.push({ id: Date.now() + 301, name: "Murat", transactions: [{ id: Date.now() + 302, type: "borrow", amount: 82500, date: new Date().toISOString() }] });
        }
        if (!seen.teyzem && !seen.teyze) {
          debts.push({ id: Date.now() + 303, name: "Teyzem", transactions: [{ id: Date.now() + 304, type: "borrow", amount: 190900, date: new Date().toISOString() }] });
        }
        return debts;
      }

      function fmt(value) {
        return (Number(value) || 0).toLocaleString("tr-TR", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 0
        });
      }

      function esc(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, function (ch) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
          }[ch];
        });
      }

      function vibrate(ms) {
        if (navigator.vibrate) {
          navigator.vibrate(ms || 9);
        }
      }

      function monthKey(year, month) {
        return year + "-" + month;
      }

      function activeMonthKey() {
        return monthKey(state.year, state.month);
      }

      function monthNum(year, month) {
        return year * 12 + month;
      }

      function normalizeText(value) {
        var text = String(value || "");
        if (text.normalize) {
          text = text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }
        return text
          .toLowerCase()
          .replace(/ı/g, "i")
          .replace(/ğ/g, "g")
          .replace(/ü/g, "u")
          .replace(/ş/g, "s")
          .replace(/ö/g, "o")
          .replace(/ç/g, "c")
          .replace(/\s+/g, " ")
          .trim();
      }

      function isPersonalDebtName(name) {
        var n = normalizeText(name);
        if (/^(murat|teyze|teyzem)$/.test(n) || /teyze/.test(n)) return true;
        return (state.personalDebts || []).some(function (debt) {
          return normalizeText(debt.name) === n;
        });
      }

      function brandOf(name) {
        var raw = String(name || "");
        var n = normalizeText(raw);
        var first = raw.trim().charAt(0).toUpperCase() || "₺";

        if (/akbank/.test(n)) return { id: "akbank", cls: "brand-akbank", mark: "Akbank", sub: "", label: "Akbank", color: "#e30613", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Akbank_logo.svg/250px-Akbank_logo.svg.png" };
        if (/garanti|bbva|ozum|troy/.test(n)) return { id: "garanti", cls: "brand-garanti", mark: "Garanti", sub: "", label: "Garanti Bankası", color: "#008b5f", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/4/4d/Garanti_BBVA_Logo.svg/250px-Garanti_BBVA_Logo.svg.png" };
        if (/emin\s*evim|eminevim/.test(n)) return { id: "eminevim", cls: "brand-eminevim", mark: "Eminevim", sub: "", label: "Eminevim", color: "#008457" };
        if (/albarak/.test(n)) return { id: "albaraka", cls: "brand-albaraka", mark: "Albaraka", sub: "Türk", label: "Albaraka Türk", color: "#00a19a", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Al_Baraka_Banking_Group_Logo.svg/250px-Al_Baraka_Banking_Group_Logo.svg.png" };
        if (/isbank|is\s*bank|is\s*b?n?ankasi|turkiye\s*is/.test(n)) return { id: "isbank", cls: "brand-isbank", mark: "İşbank", sub: "", label: "Türkiye İş Bankası", color: "#0b3a82", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/T%C3%BCrkiye_%C4%B0%C5%9F_Bankas%C4%B1_logo.svg/250px-T%C3%BCrkiye_%C4%B0%C5%9F_Bankas%C4%B1_logo.svg.png" };
        if (/ssk|sgk|sosyal guvenlik|bagkur|bag-kur/.test(n)) return { id: "sgk", cls: "brand-sgk", mark: "SGK", sub: "prim", label: "SGK / SSK", color: "#2451a3", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/T.C._Sosyal_G%C3%BCvenlik_Kurumu_logo.svg/250px-T.C._Sosyal_G%C3%BCvenlik_Kurumu_logo.svg.png" };
        if (/saglik|saglik sigortasi|tamamlayici|ozel saglik|sigorta/.test(n)) return { id: "health", cls: "brand-health", mark: "Sağlık", sub: "", label: "Sağlık", color: "#13a37f" };
        if (/enpara/.test(n)) return { id: "enpara", cls: "brand-enpara", mark: "Enpara", sub: "", label: "Enpara", color: "#7623bf", logo: "https://www.enpara.com/Frontend/dist/images/enpara.svg" };
        if (/ziraat/.test(n)) return { id: "ziraat", cls: "brand-ziraat", mark: "Z", sub: "bank", label: "Ziraat", color: "#d71920" };
        if (/yapi kredi|yapikredi/.test(n)) return { id: "yapikredi", cls: "brand-yapikredi", mark: "YK", sub: "bank", label: "Yapı Kredi", color: "#004990" };
        if (/halkbank|halk bank/.test(n)) return { id: "halkbank", cls: "brand-halkbank", mark: "H", sub: "bank", label: "Halkbank", color: "#006bb6" };
        if (/vakif/.test(n)) return { id: "vakif", cls: "brand-vakif", mark: "V", sub: "bank", label: "VakıfBank", color: "#e0a313" };
        if (/qnb|finansbank/.test(n)) return { id: "qnb", cls: "brand-qnb", mark: "Q", sub: "qnb", label: "QNB", color: "#5e2a84" };
        if (/teb/.test(n)) return { id: "teb", cls: "brand-teb", mark: "TEB", sub: "", label: "TEB", color: "#00a650" };
        if (/denizbank|deniz bank/.test(n)) return { id: "deniz", cls: "brand-deniz", mark: "D", sub: "bank", label: "DenizBank", color: "#d71920" };
        if (/ing/.test(n)) return { id: "ing", cls: "brand-ing", mark: "ING", sub: "", label: "ING", color: "#ff6200" };
        if (/altin|gram|ceyrek|yarim/.test(n)) return { id: "gold", cls: "brand-gold", mark: "AU", sub: "altın", label: "Altın", color: "#b88a2a" };
        if (/aidat|site|apartman|rezidans|residence|kira|konut|ev/.test(n)) return { id: "home", cls: "brand-home", mark: "Ev", sub: "", label: "Ev", color: "#334155" };
        if (/elektrik|su|dogalgaz|fatura|internet|telefon/.test(n)) return { id: "utility", cls: "brand-utility", mark: "F", sub: "fatura", label: "Fatura", color: "#0786a0" };
        return { id: "generic", cls: "brand-generic", mark: first, sub: "", label: "Özel", color: "#303741" };
      }

      function brandMark(name, size) {
        var b = brandOf(name);
        var logoClass = b.logo ? " has-logo" : "";
        var logo = b.logo ? '<img class="brand-logo" src="' + esc(b.logo) + '" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove();this.parentNode.classList.remove(\'has-logo\');">' : "";
        return '<span class="brand-mark ' + (size || "md") + " " + b.cls + logoClass + '" aria-hidden="true">' + logo + '<span class="brand-main">' + esc(b.mark) + '</span><span class="brand-sub">' + esc(b.sub) + "</span></span>";
      }

      function classify(name) {
        var n = normalizeText(name);
        if (/kart/.test(n)) return "card";
        if (/nakit avans|avans|nakit hesap/.test(n)) return "cash";
        if (/(kredi|albarak|emin\s*evim|eminevim|taksit)/.test(n) && !/kart/.test(n)) return "loan";
        if (/(kira|aidat|elektrik|su|dogalgaz|fatura|internet|telefon|market|sigorta|saglik|ssk|sgk|bagkur|sosyal guvenlik|benzin|yakit)/.test(n)) return "fixed";
        return "person";
      }

      function groupOf(name) {
        var type = classify(name);
        if (type === "loan" || type === "cash") return "loan";
        if (type === "card") return "card";
        if (type === "fixed") return "fixed";
        return "person";
      }

      function groupLabel(group, item) {
        if (group === "loan") return classify(item.name) === "cash" ? "Nakit avans" : "Kredi / taksit";
        if (group === "card") return "Kredi kartı";
        if (group === "fixed") return "Sabit ödeme";
        return "Diğer aylık ödeme";
      }

      function paymentKey(item) {
        return (item.isRec ? "r-" : "o-") + item.id;
      }

      function isPaid(id, isRec) {
        return (state.paid[activeMonthKey()] || []).indexOf((isRec ? "r-" : "o-") + id) > -1;
      }

      function paidMonthsCount(recId) {
        var count = 0;
        Object.keys(state.paid).forEach(function (key) {
          if ((state.paid[key] || []).indexOf("r-" + recId) > -1) count += 1;
        });
        return count;
      }

      function currentRemaining(item) {
        if (item.total == null || item.total === "") return null;
        var total = Number(item.total) || 0;
        if (!item.isRec) {
          return Math.max(0, total - (isPaid(item.id, false) ? Number(item.amount) || 0 : 0));
        }
        return Math.max(0, total - paidMonthsCount(item.id) * (Number(item.amount) || 0));
      }

      function getMonthExp(year, month) {
        var key = monthKey(year, month);
        var oneTime = (state.oneTime[key] || []).filter(function (item) {
          return !isPersonalDebtName(item.name);
        }).map(function (item) {
          return Object.assign({}, item, { isRec: false });
        });
        var mn = monthNum(year, month);
        var recurring = state.recurring
          .filter(function (item) {
            return !isPersonalDebtName(item.name) && mn >= monthNum(item.startYear, item.startMonth) && mn <= monthNum(item.endYear, item.endMonth);
          })
          .map(function (item) {
            return Object.assign({}, item, { isRec: true });
          });
        return oneTime.concat(recurring);
      }

      function getStats() {
        var all = getMonthExp(state.year, state.month);
        var groups = {
          loan: all.filter(function (item) { return groupOf(item.name) === "loan"; }),
          card: all.filter(function (item) { return groupOf(item.name) === "card"; }),
          fixed: all.filter(function (item) { return groupOf(item.name) === "fixed"; }),
          person: all.filter(function (item) { return groupOf(item.name) === "person"; })
        };
        var total = all.reduce(function (sum, item) { return sum + (Number(item.amount) || 0); }, 0);
        var paidTotal = all
          .filter(function (item) { return isPaid(item.id, item.isRec); })
          .reduce(function (sum, item) { return sum + (Number(item.amount) || 0); }, 0);
        var unpaid = Math.max(0, total - paidTotal);
        function openDebtValue(item) {
          var remaining = currentRemaining(item);
          if (remaining != null) return remaining;
          return isPaid(item.id, item.isRec) ? 0 : (Number(item.amount) || 0);
        }
        function remainingTotal(items) {
          return items.reduce(function (sum, item) {
            return sum + openDebtValue(item);
          }, 0);
        }
        var loanDebt = remainingTotal(groups.loan);
        var cardDebt = remainingTotal(groups.card);
        var debt = loanDebt + cardDebt;
        var grandOpen = loanDebt + cardDebt + unpaid;
        var monthlyLoan = groups.loan.reduce(function (sum, item) { return sum + (Number(item.amount) || 0); }, 0);
        var monthlyCard = groups.card.reduce(function (sum, item) { return sum + (Number(item.amount) || 0); }, 0);
        var monthlyFixed = groups.fixed.concat(groups.person).reduce(function (sum, item) { return sum + (Number(item.amount) || 0); }, 0);
        var monthlyOther = groups.person.reduce(function (sum, item) { return sum + (Number(item.amount) || 0); }, 0);
        return {
          all: all,
          groups: groups,
          total: total,
          paid: paidTotal,
          unpaid: unpaid,
          debt: debt,
          loanDebt: loanDebt,
          cardDebt: cardDebt,
          grandOpen: grandOpen,
          monthlyLoan: monthlyLoan,
          monthlyCard: monthlyCard,
          monthlyFixed: monthlyFixed,
          monthlyOther: monthlyOther
        };
      }

      function groupUnpaid(items) {
        return items
          .filter(function (item) { return !isPaid(item.id, item.isRec); })
          .reduce(function (sum, item) { return sum + (Number(item.amount) || 0); }, 0);
      }

      function debtTotals(debt) {
        var borrowed = 0;
        var paid = 0;
        (debt.transactions || []).forEach(function (tx) {
          if (tx.type === "pay") paid += Number(tx.amount) || 0;
          else borrowed += Number(tx.amount) || 0;
        });
        return { borrowed: borrowed, paid: paid, remaining: Math.max(0, borrowed - paid) };
      }

      function personalDebtStats() {
        return (state.personalDebts || []).reduce(function (acc, debt) {
          var t = debtTotals(debt);
          acc.borrowed += t.borrowed;
          acc.paid += t.paid;
          acc.remaining += t.remaining;
          return acc;
        }, { borrowed: 0, paid: 0, remaining: 0 });
      }

      function sortPayments(items) {
        return items.slice().sort(function (a, b) {
          return ((Number(a.day) || 31) - (Number(b.day) || 31)) ||
            String(a.name || "").localeCompare(String(b.name || ""), "tr");
        });
      }

      function advisor(stats) {
        var pct = stats.total > 0 ? Math.round((stats.paid / stats.total) * 100) : 0;
        var unpaid = stats.groups.loan.concat(stats.groups.card, stats.groups.fixed, stats.groups.person)
          .filter(function (item) { return !isPaid(item.id, item.isRec); })
          .slice()
          .sort(function (a, b) { return (Number(a.day) || 31) - (Number(b.day) || 31); });
        var urgentLoanCard = stats.groups.loan.concat(stats.groups.card)
          .filter(function (item) { return !isPaid(item.id, item.isRec); })
          .slice()
          .sort(function (a, b) { return (Number(a.day) || 31) - (Number(b.day) || 31); })[0];
        var urgent = urgentLoanCard || unpaid[0];
        var loanLeft = groupUnpaid(stats.groups.loan);
        var surplus = ADV.avgIncome - stats.total;
        var cost = Math.round(ADV.cashAdvance * ADV.cashAdvanceRate);
        var title = "Ay kontrol altında";
        var body = "Bu ay için ödeme panon hazır.";
        if (stats.total === 0) {
          title = "Bu ay sakin";
          body = "Seçili ayda kayıtlı ödeme görünmüyor.";
        } else if (pct === 100) {
          title = "Ay tamamen kapandı";
          body = "Ödemelerin tamamlandı. Fazla nakdi yüksek faizli kart ve avanslara yönlendirmek iyi görünür.";
        } else if (loanLeft > 0) {
          title = "Öncelik kredi ödemeleri";
          body = "Bu ay kredi ve taksit tarafında " + fmt(loanLeft) + "₺ açık var. İlk sırada " + (urgent ? urgent.name + " var." : "en erken günlü ödeme var.");
        } else {
          title = "Kredi tarafı temiz";
          body = "Şimdi kart, avans ve sabit ödemeleri kapatmaya odaklanabilirsin. Kalan tutar " + fmt(stats.unpaid) + "₺.";
        }
        if (surplus < 0 && stats.total > 0) {
          body += " Aylık yük ortalama gelirden yaklaşık " + fmt(Math.abs(surplus)) + "₺ fazla.";
        } else if (stats.unpaid > 0 && cost > 0) {
          body += " Avans maliyeti aylık yaklaşık " + fmt(cost) + "₺ seviyesinde.";
        }
        return { pct: pct, title: title, body: body, urgent: urgent, upcoming: unpaid.slice(0, 3) };
      }

      function chartData() {
        var data = [];
        for (var i = 5; i >= 0; i -= 1) {
          var m = now.getMonth() - i;
          var y = now.getFullYear();
          while (m < 0) {
            m += 12;
            y -= 1;
          }
          data.push({
            label: M3[m],
            value: getMonthExp(y, m).reduce(function (sum, item) { return sum + (Number(item.amount) || 0); }, 0)
          });
        }
        return data;
      }

      function renderBrandRail() {
        return '<div class="brand-rail">' + KNOWN_BRANDS.map(function (name) {
          var label = brandOf(name).label;
          return '<div class="brand-chip">' + brandMark(name, "sm") + "<span>" + esc(label) + "</span></div>";
        }).join("") + "</div>";
      }

      function renderHome(stats) {
        var adv = advisor(stats);
        var progress = Math.min(100, Math.max(0, adv.pct));
        var priority = adv.upcoming.length
          ? adv.upcoming.map(function (item) {
              return '<div class="priority-item">' +
                brandMark(item.name, "xs") +
                '<div style="min-width:0;flex:1"><h4>' + esc(item.name) + '</h4><p>' + (item.day ? item.day + ". gün" : "Gün yok") + " · " + groupLabel(groupOf(item.name), item) + "</p></div>" +
                "<strong>₺" + fmt(item.amount) + "</strong>" +
              "</div>";
            }).join("")
          : '<div class="empty" style="padding:22px 10px">Bu ay bekleyen ödeme yok.</div>';

        return '' +
          '<section class="hero">' +
            '<div class="hero-content">' +
              '<div>' +
                '<span class="eyebrow">Kişisel Finans Panosu</span>' +
                '<h2>' + esc(adv.title) + '</h2>' +
                '<p>' + esc(adv.body) + '</p>' +
              '</div>' +
              '<div class="dial" style="--p:' + progress + '"><div class="dial-inner">' + progress + '%</div></div>' +
            '</div>' +
            '<div class="hero-metrics">' +
              '<div class="hero-metric"><span>Toplam</span><strong>₺' + fmt(stats.total) + '</strong></div>' +
              '<div class="hero-metric"><span>Ödenen</span><strong>₺' + fmt(stats.paid) + '</strong></div>' +
              '<div class="hero-metric"><span>Kalan</span><strong>₺' + fmt(stats.unpaid) + '</strong></div>' +
            '</div>' +
          '</section>' +
          '<div class="metric-grid">' +
            '<button class="metric-card" data-action="tab" data-tab="expenses"><span>Aylık Toplam</span><strong>₺' + fmt(stats.total) + '</strong><small>' + MONTHS[state.month] + ' ödemeleri</small></button>' +
            '<button class="metric-card" data-action="tab" data-tab="cards"><span>Kredi Toplamı</span><strong class="color-red">₺' + fmt(stats.loanDebt) + '</strong><small>Aylık ₺' + fmt(stats.monthlyLoan) + '</small></button>' +
            '<button class="metric-card" data-action="tab" data-tab="cards"><span>Kart Toplamı</span><strong class="color-gold">₺' + fmt(stats.cardDebt) + '</strong><small>Aylık ₺' + fmt(stats.monthlyCard) + '</small></button>' +
            '<button class="metric-card" data-action="tab" data-tab="expenses"><span>Kalan Ödeme</span><strong class="' + (stats.unpaid ? "color-red" : "color-green") + '">₺' + fmt(stats.unpaid) + '</strong><small>' + (stats.unpaid ? "Bekliyor" : "Kapandı") + '</small></button>' +
          '</div>' +
          renderBrandRail() +
          '<section class="priority-card">' +
            '<div class="section-title"><span>Öncelik Sırası</span><strong>₺' + fmt(stats.unpaid) + '</strong></div>' +
            '<div class="priority-list">' + priority + '</div>' +
          '</section>' +
          renderChart();
      }

      function renderChart() {
        var data = chartData();
        var max = data.reduce(function (m, item) { return Math.max(m, item.value); }, 1);
        return '<section class="chart-card">' +
          '<div class="section-title"><span>Son 6 Ay</span><strong>Aylık gider</strong></div>' +
          '<div class="bars">' + data.map(function (item, index) {
            var height = Math.max(6, Math.round((item.value / max) * 74));
            var active = index === data.length - 1 ? " active" : "";
            return '<div class="bar-wrap"><div class="bar' + active + '" style="height:' + height + 'px"></div><span class="bar-label">' + esc(item.label) + '</span></div>';
          }).join("") + '</div>' +
        '</section>';
      }

      function renderExpenses(stats) {
        var html = '' +
          '<section class="toolbar-card">' +
            '<button class="nav-btn" data-action="prev-month" aria-label="Önceki ay">‹</button>' +
            '<div class="month-center"><strong>' + MONTHS[state.month] + '</strong><span>' + state.year + '</span></div>' +
            '<button class="nav-btn" data-action="next-month" aria-label="Sonraki ay">›</button>' +
          '</section>' +
          '<div class="month-strip">' + MONTHS.map(function (_, i) {
            var has = getMonthExp(state.year, i).length > 0;
            var cls = "month-chip" + (has ? " has-data" : "") + (i === state.month ? " active" : "");
            return '<button class="' + cls + '" data-action="select-month" data-month="' + i + '">' + M3[i] + '</button>';
          }).join("") + '</div>' +
          '<section class="summary-strip summary-single">' +
            '<div class="summary-cell"><span>Aylık Ödeme Toplamı</span><strong class="' + (stats.unpaid ? "color-red" : "color-green") + '">₺' + fmt(stats.unpaid) + '</strong><small>Bu ay toplam ₺' + fmt(stats.total) + ' · Ödenen ₺' + fmt(stats.paid) + '</small></div>' +
          '</section>';

        html += renderPaymentSection("Ay Sırası", stats.all, "1. günden son güne · Kalan ₺" + fmt(stats.unpaid));

        if (!stats.all.length) {
          html += '<div class="empty">' + MONTHS[state.month] + ' için ödeme yok.</div>';
        }

        if (state.addOpen) {
          html += renderAddPayment();
        } else {
          html += '<button class="add-btn" data-action="show-add">+ Ödeme Ekle</button>';
        }
        return html;
      }

      function renderPaymentSection(title, items, meta) {
        return '<section class="payment-section">' +
          '<div class="section-title"><span>' + esc(title) + '</span><strong>' + esc(meta || ("₺" + fmt(groupUnpaid(items)))) + '</strong></div>' +
          '<div class="payment-grid">' + (items.length ? sortPayments(items).map(renderPaymentCard).join("") : '<div class="empty" style="padding:16px 10px;font-size:11px">Kayıt yok.</div>') + '</div>' +
        '</section>';
      }

      function renderPaymentCard(item) {
        var key = paymentKey(item);
        if (state.editKey === key) return renderEditPayment(item);
        var paid = isPaid(item.id, item.isRec);
        var brand = brandOf(item.name);
        var group = groupOf(item.name);
        var remaining = currentRemaining(item);
        var done = remaining != null && remaining <= 0;
        var debtLabel = group === "card" ? "Kart borcu" : (group === "loan" ? "Toplam borç" : "Durum");
        var debtText = paid ? "Ödendi" : "Bekliyor";
        var debtGood = paid;
        var statusText = paid ? "Kapandı" : "Bekliyor";
        if (remaining != null) {
          debtText = done ? "Kapandı" : "₺" + fmt(remaining);
          debtGood = done;
          statusText = done ? "Kapandı" : (paid ? "Bu ay ödendi" : "Açık");
        } else if (group === "card" || group === "loan") {
          debtText = paid ? "Kapandı" : "₺" + fmt(item.amount);
          debtGood = paid;
          statusText = paid ? "Kapandı" : "Aylık açık";
        }
        var middle = '<div class="payment-stat"><span class="micro-label">' + debtLabel + '</span><strong class="debt-value ' + (debtGood ? "good" : "") + '">' + debtText + '</strong></div>' +
          '<div class="payment-stat"><span class="micro-label">Bu ay</span><strong class="debt-value">₺' + fmt(item.amount) + '</strong></div>';
        return '<article class="payment-card' + (paid ? " is-paid" : "") + '" style="--brand:' + brand.color + '">' +
          '<div class="payment-top">' +
            brandMark(item.name, "md") +
            '<div class="payment-title"><h3>' + esc(item.name) + '</h3><p>' + groupLabel(group, item) + ' · ' + (item.isRec ? "Her ay" : "Tek sefer") + '</p></div>' +
            '<span class="due-pill">' + (item.day ? item.day + ". gün" : "Gün yok") + '</span>' +
          '</div>' +
          '<div class="payment-middle">' + middle + '</div>' +
          '<div class="payment-bottom">' +
            '<div class="amount-block"><span class="payment-label">Durum</span><strong class="amount">' + statusText + '</strong></div>' +
            '<button class="pay-btn' + (paid ? " paid" : "") + '" data-action="toggle-paid" data-key="' + key + '">' + (paid ? "Ödendi" : "Öde") + '</button>' +
            '<button class="icon-btn" data-action="edit-payment" data-key="' + key + '" aria-label="Düzenle">✎</button>' +
            '<button class="icon-btn delete" data-action="delete-payment" data-key="' + key + '" aria-label="Sil">×</button>' +
          '</div>' +
        '</article>';
      }

      function renderEditPayment(item) {
        var key = paymentKey(item);
        return '<article class="payment-card edit-card" style="--brand:' + brandOf(item.name).color + '">' +
          '<form class="form-grid" data-edit-form data-key="' + key + '">' +
            '<div class="field"><label>Ad</label><input class="input" name="name" value="' + esc(item.name) + '" autocomplete="off"></div>' +
            '<div class="form-row">' +
              '<div class="field"><label>Bu ay ₺</label><input class="input" name="amount" type="number" inputmode="decimal" value="' + esc(item.amount) + '"></div>' +
              '<div class="field"><label>Gün</label><input class="input" name="day" type="number" inputmode="numeric" value="' + esc(item.day || "") + '"></div>' +
            '</div>' +
            '<div class="field"><label>Toplam tutar / kalan borç ₺</label><input class="input" name="total" type="number" inputmode="decimal" value="' + esc(item.total == null ? "" : item.total) + '"></div>' +
            '<div class="form-actions"><button type="button" class="primary-btn" data-action="save-edit">Kaydet</button><button type="button" class="ghost-btn" data-action="cancel-edit">İptal</button></div>' +
          '</form>' +
        '</article>';
      }

      function renderAddPayment() {
        return '<section class="add-panel">' +
          '<div class="brand-preview" data-brand-preview>' +
            brandMark("Yeni ödeme", "xl") +
            '<div><strong>Yeni ödeme</strong><span class="preview-sub">Logo adı takip eder</span></div>' +
          '</div>' +
          '<form class="form-grid" id="add-payment-form">' +
            '<div class="field"><label>Ödeme adı</label><input class="input" name="name" data-live-brand autocomplete="off" placeholder="Akbank kredi, Aidat, SGK, sağlık sigortası"></div>' +
            '<div class="form-row">' +
              '<div class="field"><label>Bu ay ₺</label><input class="input" name="amount" type="number" inputmode="decimal" placeholder="0"></div>' +
              '<div class="field"><label>Gün</label><input class="input" name="day" type="number" inputmode="numeric" placeholder="1"></div>' +
            '</div>' +
            '<div class="field"><label>Toplam tutar / kalan borç ₺</label><input class="input" name="total" type="number" inputmode="decimal" placeholder="Opsiyonel"></div>' +
            '<label class="toggle-row"><input type="checkbox" name="recurring" checked><span>Her ay tekrarlasın</span></label>' +
            '<div class="form-actions"><button type="button" class="primary-btn" data-action="add-payment">Ekle</button><button type="button" class="ghost-btn" data-action="hide-add">Vazgeç</button></div>' +
          '</form>' +
        '</section>';
      }

      function renderCards(stats) {
        var loanAndCard = stats.groups.loan.concat(stats.groups.card);
        var html = '' +
          '<section class="summary-strip">' +
            '<div class="summary-cell"><span>Kredi</span><strong class="color-red">₺' + fmt(stats.loanDebt) + '</strong></div>' +
            '<div class="summary-cell"><span>Kart</span><strong class="color-gold">₺' + fmt(stats.cardDebt) + '</strong></div>' +
            '<div class="summary-cell"><span>Aylık</span><strong>₺' + fmt(stats.monthlyLoan + stats.monthlyCard) + '</strong></div>' +
          '</section>' +
          '<div class="metric-grid">' +
            '<div class="metric-card"><span>Kredi Taksitleri</span><strong>₺' + fmt(stats.monthlyLoan) + '</strong><small>Bu ayki ödeme</small></div>' +
            '<div class="metric-card"><span>Kart Ödemeleri</span><strong>₺' + fmt(stats.monthlyCard) + '</strong><small>Bu ayki ödeme</small></div>' +
          '</div>';

        html += renderPaymentSection("Krediler & Nakit Avans", stats.groups.loan, "loan");
        html += renderPaymentSection("Kredi Kartları", stats.groups.card, "card");

        if (!loanAndCard.length) {
          html += '<div class="empty">Kredi veya kredi kartı kaydı yok.</div>';
        }

        html += '<button class="add-btn" data-action="quick-add-payment">+ Yeni Gider Ekle</button>';
        return html;
      }

      function renderDebts() {
        var stats = personalDebtStats();
        var html = '' +
          '<section class="summary-strip">' +
            '<div class="summary-cell"><span>Toplam Borç</span><strong class="color-red">₺' + fmt(stats.borrowed) + '</strong></div>' +
            '<div class="summary-cell"><span>Ödenen</span><strong class="color-green">₺' + fmt(stats.paid) + '</strong></div>' +
            '<div class="summary-cell"><span>Kalan</span><strong class="color-red">₺' + fmt(stats.remaining) + '</strong></div>' +
            '<div class="summary-cell"><span>Kayıt</span><strong>' + (state.personalDebts || []).length + '</strong></div>' +
          '</section>';

        html += '<section class="payment-section"><div class="section-title"><span>Kişisel Borçlar</span><strong>ekle / düş / düzenle</strong></div>';
        (state.personalDebts || []).forEach(function (debt) {
          html += renderDebtCard(debt);
        });
        html += '</section>';

        if (!(state.personalDebts || []).length) {
          html += '<div class="empty">Borç kaydı yok.</div>';
        }

        if (state.debtAddOpen) {
          html += renderDebtAddForm();
        } else {
          html += '<button class="add-btn" data-action="show-debt-add">+ Borç Ekle</button>';
        }
        return html;
      }

      function renderDebtCard(debt) {
        var t = debtTotals(debt);
        if (state.debtEditKey === String(debt.id)) {
          return '<article class="debt-card debt-edit-card">' +
            '<form class="form-grid" data-debt-edit-form data-id="' + debt.id + '">' +
              '<div class="field"><label>İsim</label><input class="input" name="name" value="' + esc(debt.name) + '" autocomplete="off"></div>' +
              '<div class="field"><label>Toplam borç ₺</label><input class="input" name="total" type="number" inputmode="decimal" value="' + esc(t.borrowed) + '"></div>' +
              '<div class="form-actions"><button type="button" class="primary-btn" data-action="save-debt-edit">Kaydet</button><button type="button" class="ghost-btn" data-action="cancel-debt-edit">İptal</button></div>' +
            '</form>' +
          '</article>';
        }
        var action = state.debtAction[String(debt.id)] || null;
        var actionRow = action ? '<div class="debt-action-row">' +
          '<input class="input" data-debt-action-amount="' + debt.id + '" type="number" inputmode="decimal" placeholder="' + (action === "pay" ? "Ödeme tutarı" : "Ek borç tutarı") + '">' +
          '<button class="small-btn ' + (action === "pay" ? "green" : "red") + '" data-action="confirm-debt-action" data-id="' + debt.id + '">' + (action === "pay" ? "Düş" : "Ekle") + '</button>' +
          '<button class="small-btn" data-action="cancel-debt-action" data-id="' + debt.id + '">İptal</button>' +
        '</div>' : "";

        return '<article class="debt-card">' +
          '<div class="debt-head">' +
            brandMark(debt.name, "sm") +
            '<div class="debt-copy"><h3>' + esc(debt.name) + '</h3><p>Alınan ₺' + fmt(t.borrowed) + ' · Ödenen ₺' + fmt(t.paid) + '</p></div>' +
            '<strong class="debt-remain">₺' + fmt(t.remaining) + '</strong>' +
          '</div>' +
          '<div class="debt-actions">' +
            '<button class="small-btn green" data-action="start-debt-action" data-type="pay" data-id="' + debt.id + '">Ödeme düş</button>' +
            '<button class="small-btn red" data-action="start-debt-action" data-type="borrow" data-id="' + debt.id + '">Borç ekle</button>' +
            '<button class="icon-btn" data-action="edit-debt" data-id="' + debt.id + '" aria-label="Düzenle">✎</button>' +
            '<button class="icon-btn delete" data-action="delete-debt" data-id="' + debt.id + '" aria-label="Sil">×</button>' +
          '</div>' +
          actionRow +
        '</article>';
      }

      function renderDebtAddForm() {
        return '<section class="add-panel">' +
          '<form class="form-grid" id="add-debt-form">' +
            '<div class="field"><label>İsim</label><input class="input" name="name" autocomplete="off" placeholder="Örn. Murat"></div>' +
            '<div class="field"><label>Toplam borç ₺</label><input class="input" name="total" type="number" inputmode="decimal" placeholder="0"></div>' +
            '<div class="form-actions"><button type="button" class="primary-btn" data-action="add-debt">Ekle</button><button type="button" class="ghost-btn" data-action="hide-debt-add">Vazgeç</button></div>' +
          '</form>' +
        '</section>';
      }

      function renderTabBar() {
        var tabs = [
          { id: "expenses", icon: "₺", label: "Ödemeler" },
          { id: "debts", icon: "B", label: "Borç" }
        ];
        return '<nav class="tabbar">' + tabs.map(function (tab) {
          var active = state.tab === tab.id ? " active" : "";
          return '<button class="tab' + active + '" data-action="tab" data-tab="' + tab.id + '"><i>' + esc(tab.icon) + '</i><span>' + esc(tab.label) + '</span></button>';
        }).join("") + '</nav>';
      }

      function render() {
        document.documentElement.setAttribute("data-theme", state.dark ? "dark" : "light");
        storage.set("dark-mode", state.dark);
        var stats = getStats();
        var content = state.tab === "debts" ? renderDebts() : renderExpenses(stats);
        root.innerHTML = '<div class="shell">' +
          '<header class="topbar">' +
            '<div><div class="brand-title"><strong>Finans</strong><span>Pro</span></div><div class="top-sub"><i class="privacy-dot"></i><span>' + MONTHS[now.getMonth()] + " " + now.getFullYear() + " · Yerel kasa</span></div></div>" +
            '<button class="theme-btn" data-action="theme" aria-label="Tema değiştir">' + (state.dark ? "☀" : "☾") + '</button>' +
          '</header>' +
          '<main class="main">' + content + '</main>' +
          renderTabBar() +
        '</div>';
      }

      function readNumber(form, name) {
        var el = form.elements[name];
        return el && el.value !== "" ? Number(el.value) || 0 : 0;
      }

      function findPaymentByKey(key) {
        return getMonthExp(state.year, state.month).filter(function (item) {
          return paymentKey(item) === key;
        })[0] || null;
      }

      function parseKey(key) {
        return { isRec: key.indexOf("r-") === 0, id: key.slice(2) };
      }

      function togglePaid(key) {
        var parsed = parseKey(key);
        var current = state.paid[activeMonthKey()] || [];
        var exists = current.indexOf(key) > -1;
        var next = exists ? current.filter(function (item) { return item !== key; }) : current.concat([key]);
        state.paid = Object.assign({}, state.paid);
        state.paid[activeMonthKey()] = next;
        storage.set("fp-paid", state.paid);
        vibrate(12);
      }

      function deletePayment(key) {
        var parsed = parseKey(key);
        if (!confirm("Bu ödeme kalemi silinsin mi?")) return;
        if (parsed.isRec) {
          state.recurring = state.recurring.filter(function (item) { return String(item.id) !== parsed.id; });
          storage.set("fp-recurring", state.recurring);
        } else {
          var keyMonth = activeMonthKey();
          var list = state.oneTime[keyMonth] || [];
          state.oneTime = Object.assign({}, state.oneTime);
          state.oneTime[keyMonth] = list.filter(function (item) { return String(item.id) !== parsed.id; });
          storage.set("fp-onetime", state.oneTime);
        }
        state.editKey = null;
        vibrate(18);
      }

      function saveEdit() {
        var form = root.querySelector("[data-edit-form]");
        if (!form) return;
        var key = form.getAttribute("data-key");
        var parsed = parseKey(key);
        var totalInput = form.elements.total.value;
        var patch = {
          name: form.elements.name.value.trim() || "Ödeme",
          amount: readNumber(form, "amount"),
          day: Number(form.elements.day.value) || 1,
          total: totalInput === "" ? null : Number(totalInput) || 0
        };
        if (parsed.isRec) {
          state.recurring = state.recurring.map(function (item) {
            return String(item.id) === parsed.id ? Object.assign({}, item, patch) : item;
          });
          storage.set("fp-recurring", state.recurring);
        } else {
          var keyMonth = activeMonthKey();
          state.oneTime = Object.assign({}, state.oneTime);
          state.oneTime[keyMonth] = (state.oneTime[keyMonth] || []).map(function (item) {
            return String(item.id) === parsed.id ? Object.assign({}, item, patch) : item;
          });
          storage.set("fp-onetime", state.oneTime);
        }
        state.editKey = null;
        vibrate(10);
      }

      function addPayment() {
        var form = root.querySelector("#add-payment-form");
        if (!form) return;
        var name = form.elements.name.value.trim();
        var amount = readNumber(form, "amount");
        if (!name || !amount) return;
        var day = Number(form.elements.day.value) || 1;
        var total = form.elements.total.value === "" ? null : Number(form.elements.total.value) || 0;
        var item = {
          id: Date.now(),
          name: name,
          amount: amount,
          total: total,
          day: day
        };
        if (form.elements.recurring.checked) {
          state.recurring = state.recurring.concat([Object.assign({}, item, {
            startMonth: state.month,
            startYear: state.year,
            endMonth: 11,
            endYear: state.year + 8
          })]);
          storage.set("fp-recurring", state.recurring);
        } else {
          var key = activeMonthKey();
          state.oneTime = Object.assign({}, state.oneTime);
          state.oneTime[key] = (state.oneTime[key] || []).concat([item]);
          storage.set("fp-onetime", state.oneTime);
        }
        state.addOpen = false;
        vibrate(12);
      }

      function savePersonalDebts(next) {
        state.personalDebts = next;
        storage.set("fp-person-debts", next);
      }

      function addDebt() {
        var form = root.querySelector("#add-debt-form");
        if (!form) return;
        var name = form.elements.name.value.trim();
        var total = readNumber(form, "total");
        if (!name || total <= 0) return;
        savePersonalDebts((state.personalDebts || []).concat([{
          id: Date.now(),
          name: name,
          transactions: [{ id: Date.now() + 1, type: "borrow", amount: total, date: new Date().toISOString() }]
        }]));
        state.debtAddOpen = false;
        vibrate(10);
      }

      function debtTransaction(id, type) {
        var input = root.querySelector('[data-debt-action-amount="' + id + '"]');
        var amount = input ? Number(input.value) || 0 : 0;
        if (amount <= 0) return;
        savePersonalDebts((state.personalDebts || []).map(function (debt) {
          if (String(debt.id) !== String(id)) return debt;
          return Object.assign({}, debt, {
            transactions: (debt.transactions || []).concat([{ id: Date.now(), type: type, amount: amount, date: new Date().toISOString() }])
          });
        }));
        var actions = Object.assign({}, state.debtAction);
        delete actions[String(id)];
        state.debtAction = actions;
        vibrate(10);
      }

      function saveDebtEdit() {
        var form = root.querySelector("[data-debt-edit-form]");
        if (!form) return;
        var id = form.getAttribute("data-id");
        var name = form.elements.name.value.trim() || "Borç";
        var total = readNumber(form, "total");
        savePersonalDebts((state.personalDebts || []).map(function (debt) {
          if (String(debt.id) !== String(id)) return debt;
          var txs = (debt.transactions || []).slice();
          var firstBorrow = txs.find(function (tx) { return tx.type !== "pay"; });
          if (firstBorrow) firstBorrow.amount = total;
          else txs.unshift({ id: Date.now(), type: "borrow", amount: total, date: new Date().toISOString() });
          return Object.assign({}, debt, { name: name, transactions: txs });
        }));
        state.debtEditKey = null;
        vibrate(10);
      }

      function deleteDebt(id) {
        if (!confirm("Bu borç kaydı silinsin mi?")) return;
        savePersonalDebts((state.personalDebts || []).filter(function (debt) {
          return String(debt.id) !== String(id);
        }));
        vibrate(18);
      }

      root.addEventListener("click", function (event) {
        var button = event.target.closest("[data-action]");
        if (!button) return;
        var action = button.getAttribute("data-action");
        if (action === "theme") {
          state.dark = !state.dark;
        } else if (action === "tab") {
          state.tab = button.getAttribute("data-tab");
          state.addOpen = false;
          state.editKey = null;
          state.debtAddOpen = false;
          state.debtEditKey = null;
          state.debtAction = {};
          vibrate(6);
        } else if (action === "quick-add-payment") {
          state.tab = "expenses";
          state.addOpen = true;
          state.editKey = null;
          vibrate(6);
        } else if (action === "prev-month") {
          if (state.month === 0) {
            state.month = 11;
            state.year -= 1;
          } else {
            state.month -= 1;
          }
          state.editKey = null;
          vibrate(6);
        } else if (action === "next-month") {
          if (state.month === 11) {
            state.month = 0;
            state.year += 1;
          } else {
            state.month += 1;
          }
          state.editKey = null;
          vibrate(6);
        } else if (action === "select-month") {
          state.month = Number(button.getAttribute("data-month")) || 0;
          state.editKey = null;
          vibrate(6);
        } else if (action === "toggle-paid") {
          togglePaid(button.getAttribute("data-key"));
        } else if (action === "edit-payment") {
          state.editKey = button.getAttribute("data-key");
          state.addOpen = false;
          vibrate(6);
        } else if (action === "delete-payment") {
          deletePayment(button.getAttribute("data-key"));
        } else if (action === "save-edit") {
          saveEdit();
        } else if (action === "cancel-edit") {
          state.editKey = null;
        } else if (action === "show-add") {
          state.addOpen = true;
          state.editKey = null;
        } else if (action === "hide-add") {
          state.addOpen = false;
        } else if (action === "add-payment") {
          addPayment();
        } else if (action === "show-debt-add") {
          state.debtAddOpen = true;
          state.debtEditKey = null;
          state.debtAction = {};
        } else if (action === "hide-debt-add") {
          state.debtAddOpen = false;
        } else if (action === "add-debt") {
          addDebt();
        } else if (action === "start-debt-action") {
          state.debtAction = Object.assign({}, state.debtAction, (function () {
            var o = {};
            o[String(button.getAttribute("data-id"))] = button.getAttribute("data-type");
            return o;
          })());
          state.debtEditKey = null;
          state.debtAddOpen = false;
        } else if (action === "confirm-debt-action") {
          var id = button.getAttribute("data-id");
          debtTransaction(id, state.debtAction[String(id)] || "pay");
        } else if (action === "cancel-debt-action") {
          var cancelActions = Object.assign({}, state.debtAction);
          delete cancelActions[String(button.getAttribute("data-id"))];
          state.debtAction = cancelActions;
        } else if (action === "edit-debt") {
          state.debtEditKey = String(button.getAttribute("data-id"));
          state.debtAction = {};
          state.debtAddOpen = false;
        } else if (action === "save-debt-edit") {
          saveDebtEdit();
        } else if (action === "cancel-debt-edit") {
          state.debtEditKey = null;
        } else if (action === "delete-debt") {
          deleteDebt(button.getAttribute("data-id"));
        }
        render();
      });

      root.addEventListener("input", function (event) {
        var input = event.target;
        if (input.matches("[data-live-brand]")) {
          var value = input.value.trim() || "Yeni ödeme";
          var preview = root.querySelector("[data-brand-preview]");
          if (preview) {
            var b = brandOf(value);
            preview.innerHTML = brandMark(value, "xl") + '<div><strong>' + esc(value) + '</strong><span class="preview-sub">' + esc(b.label) + "</span></div>";
          }
        }
      });

      render();
    })();
  </script>
</body>
</html>

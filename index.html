<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finans">
  <meta name="theme-color" content="#ffffff">
  <title>Finans Pro</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --bg-card: #ffffff;
      --bg-soft: #f1f4f9;
      --bg-tint: #e9eef6;
      --text: #0f1620;
      --text-soft: #586273;
      --text-dim: #98a3b3;
      --border: #e8ecf3;
      --border-strong: #d8dee8;
      --ink: #161e2b;
      --ink-soft: #2c3848;
      --green: #15a06a;
      --green-soft: #e6f6ef;
      --red: #d4453f;
      --red-soft: #fceae9;
      --amber: #c5901c;
      --gold: #b8902f;
      --shadow-sm: 0 1px 2px rgba(15,22,32,0.04);
      --shadow: 0 2px 6px rgba(15,22,32,0.05), 0 10px 28px rgba(15,22,32,0.05);
      --shadow-md: 0 6px 24px rgba(15,22,32,0.10);
    }
    .dark {
      --bg: #090d13;
      --bg-card: #121922;
      --bg-soft: #19212c;
      --bg-tint: #202935;
      --text: #f0f4f9;
      --text-soft: #9aa6b5;
      --text-dim: #64707e;
      --border: #212a36;
      --border-strong: #2c3744;
      --ink: #f0f4f9;
      --ink-soft: #c5cfdb;
      --green: #2bbd84;
      --green-soft: #112a20;
      --red: #e8625c;
      --red-soft: #2d1817;
      --amber: #d6a338;
      --gold: #d4ab4a;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow: 0 2px 6px rgba(0,0,0,0.3), 0 10px 28px rgba(0,0,0,0.35);
      --shadow-md: 0 6px 24px rgba(0,0,0,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-font-smoothing: antialiased;
    }
    input, select, textarea { font-size: 16px; font-family: inherit; }
    ::-webkit-scrollbar { display: none; }
    button { font-family: inherit; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pop { 0% { transform: scale(0); } 60% { transform: scale(1.25); } 100% { transform: scale(1); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.35s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
  var e = React.createElement;
  var useState=React.useState, useEffect=React.useEffect, useMemo=React.useMemo, useCallback=React.useCallback;

  var MONTHS=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  var M3=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  var ADV={ avgIncome:150000, cashAdvance:250000, cashAdvanceRate:0.0425 };

  var storage={
    get:function(k){ try{return JSON.parse(localStorage.getItem(k));}catch(x){return null;} },
    set:function(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(x){} }
  };
  function fmt(n){ return (Number(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
  function monthNum(y,m){ return y*12+m; }
  function vibrate(p){ if(navigator.vibrate) navigator.vibrate(p||10); }

  // ===== Premium amblemler — gerçek banka logoları (yüklenmezse renkli ambleme düşer) =====
  function brandOf(name){
    var l=(name||'').toLowerCase();
    if(/akbank/.test(l)) return {bg:'#e30613', fg:'#fff', mark:'Akbank', logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Akbank_logo.svg/250px-Akbank_logo.svg.png'};
    if(/garanti|bbva|ozum|özüm|troy/.test(l)) return {bg:'#00754a', fg:'#fff', mark:'Garanti', logo:'https://upload.wikimedia.org/wikipedia/en/thumb/4/4d/Garanti_BBVA_Logo.svg/250px-Garanti_BBVA_Logo.svg.png'};
    if(/bankası|bankasi|is bank|işbank|isbank|iş bank|türkiye is/.test(l)) return {bg:'#0a3d91', fg:'#fff', mark:'İş Bankası', logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/T%C3%BCrkiye_%C4%B0%C5%9F_Bankas%C4%B1_logo.svg/250px-T%C3%BCrkiye_%C4%B0%C5%9F_Bankas%C4%B1_logo.svg.png'};
    if(/enpara/.test(l)) return {bg:'#7d2ae8', fg:'#fff', mark:'enpara', logo:'https://www.enpara.com/Frontend/dist/images/enpara.svg'};
    if(/albaraka|albarak/.test(l)) return {bg:'#00a19a', fg:'#fff', mark:'Albaraka', logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Al_Baraka_Banking_Group_Logo.svg/250px-Al_Baraka_Banking_Group_Logo.svg.png'};
    if(/ssk|bağkur|bagkur|sgk|sosyal/.test(l)) return {bg:'#1f4e9c', fg:'#fff', mark:'SGK', logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/T.C._Sosyal_G%C3%BCvenlik_Kurumu_logo.svg/250px-T.C._Sosyal_G%C3%BCvenlik_Kurumu_logo.svg.png'};
    if(/eminevim|emin evim/.test(l)) return {bg:'#00854a', fg:'#fff', mark:'eminevim'};
    if(/ziraat/.test(l)) return {bg:'#d6121f', fg:'#fff', mark:'Ziraat'};
    if(/yapı ?kredi|yapikredi/.test(l)) return {bg:'#004990', fg:'#fff', mark:'Yapı Kredi'};
    if(/halkbank|halk bank/.test(l)) return {bg:'#005baa', fg:'#fff', mark:'Halkbank'};
    if(/vakıf|vakif/.test(l)) return {bg:'#f7b500', fg:'#1a2230', mark:'Vakıf'};
    if(/qnb|finansbank/.test(l)) return {bg:'#5b2d8e', fg:'#fff', mark:'QNB'};
    if(/teb/.test(l)) return {bg:'#00a651', fg:'#fff', mark:'TEB'};
    if(/deniz ?bank|denizbank/.test(l)) return {bg:'#e2001a', fg:'#fff', mark:'Deniz'};
    if(/ing/.test(l)) return {bg:'#ff6200', fg:'#fff', mark:'ING'};
    if(/sağlık|saglik|sigorta|tamamlayici/.test(l)) return {bg:'#0a8f5b', fg:'#fff', icon:'🩺', big:true};
    if(/aidat/.test(l)) return {bg:'linear-gradient(145deg,#7c8da3,#4a5a70)', fg:'#fff', icon:'🏢', big:true};
    if(/kira|konut|ev|rezidans|residence|site|apartman/.test(l)) return {bg:'linear-gradient(145deg,#3f6f5b,#27503f)', fg:'#fff', icon:'🏠', big:true};
    if(/elektrik|su|doğalgaz|dogalgaz|fatura|internet|telefon/.test(l)) return {bg:'#0891b2', fg:'#fff', icon:'⚡', big:true};
    if(/market|mutfak/.test(l)) return {bg:'#ca8a04', fg:'#fff', icon:'🛒', big:true};
    if(/altın|altin|gram|çeyrek|ceyrek/.test(l)) return {bg:'#b8902f', fg:'#fff', icon:'🪙', big:true};
    if(/nakit|kasa/.test(l)) return {bg:'#15a06a', fg:'#fff', icon:'💵', big:true};
    var first=(name||'?').trim().charAt(0).toUpperCase();
    var palette=['#6d28d9','#be123c','#0369a1','#047857','#a16207','#9333ea','#0e7490'];
    return {bg:palette[(name||'').length % palette.length], fg:'#fff', icon:first, big:true};
  }
  function Emblem(props){
    var b=brandOf(props.name); var sz=props.size||44;
    var err=useState(false); var failed=err[0],setFailed=err[1];
    var box={width:sz,height:sz,borderRadius:sz*0.27,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 1px 3px rgba(0,0,0,0.12)',overflow:'hidden',border:'1px solid rgba(0,0,0,0.06)'};
    if(b.logo && !failed){
      return e('div',{style:box}, e('img',{src:b.logo, alt:'', onError:function(){setFailed(true);}, style:{width:'78%',height:'78%',objectFit:'contain'}}));
    }
    var fbox={width:sz,height:sz,borderRadius:sz*0.27,background:b.bg,color:b.fg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'inset 0 -2px 6px rgba(0,0,0,0.14)',overflow:'hidden'};
    if(b.icon) return e('div',{style:fbox}, e('span',{style:{fontSize:sz*0.46}}, b.icon));
    return e('div',{style:fbox}, e('span',{style:{fontSize:b.mark.length>=8?(sz*0.185):(b.mark.length>6?sz*0.22:sz*0.28),fontWeight:800,lineHeight:1.05,textAlign:'center',padding:'0 1px',letterSpacing:-0.3,whiteSpace:'nowrap'}}, b.mark));
  }

  function classify(name){
    var l=(name||'').toLowerCase();
    if(/kart/.test(l)) return 'card';
    if(/nakit avans|avans|nakit hesap/.test(l)) return 'cash';
    if(/(kredi|albaraka|eminevim|emin evim|taksit)/.test(l) && !/kart/.test(l)) return 'loan';
    if(/(kira|aidat|elektrik|su|doğalgaz|fatura|internet|telefon|market|sigorta|sağlık|ssk|bağkur|sgk|sosyal|benzin|yakıt|rezidans|konut)/.test(l)) return 'fixed';
    return 'person';
  }

  function RingWhite(props){
    var r=22,c=2*Math.PI*r;
    return e('svg',{width:60,height:60,viewBox:'0 0 52 52'},
      e('circle',{cx:26,cy:26,r:r,fill:'none',stroke:'rgba(255,255,255,0.22)',strokeWidth:5}),
      e('circle',{cx:26,cy:26,r:r,fill:'none',stroke:'#fff',strokeWidth:5,strokeDasharray:c,strokeDashoffset:c*(1-(props.progress||0)/100),transform:'rotate(-90 26 26)',strokeLinecap:'round',style:{transition:'stroke-dashoffset 0.7s ease'}}),
      e('text',{x:26,y:26,textAnchor:'middle',dy:'0.35em',fontSize:13,fontWeight:800,fill:'#fff'}, (props.progress||0)+'%')
    );
  }
  function Bars(props){
    var data=props.data, max=Math.max.apply(null,data.map(function(d){return d.value;}).concat([1]));
    return e('div',{style:{display:'flex',alignItems:'flex-end',gap:6,height:70,padding:'0 2px'}},
      data.map(function(d,i){
        var h=Math.max(4,(d.value/max)*60), isNow=i===data.length-1;
        return e('div',{key:i,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:5}},
          e('div',{style:{width:'100%',height:h,background:isNow?'var(--ink)':'var(--bg-tint)',borderRadius:'4px 4px 2px 2px',transition:'height 0.5s ease'}}),
          e('span',{style:{fontSize:9,color:isNow?'var(--ink)':'var(--text-dim)',fontWeight:isNow?700:500}}, d.label)
        );
      })
    );
  }

  function App(){
    var dm=useState(function(){var v=storage.get('dark-mode');return v==null?false:v;}); var dark=dm[0],setDark=dm[1];
    var t=useState('expenses'); var tab=t[0],setTab=t[1];
    var s4=useState({}); var oneTime=s4[0],setOneTime=s4[1];
    var s5=useState([]); var recurring=s5[0],setRecurring=s5[1];
    var s6=useState({}); var paid=s6[0],setPaid=s6[1];
    var sv=useState([]); var savings=sv[0],setSavings=sv[1];
    var s7=useState(true); var loading=s7[0],setLoading=s7[1];
    var uh=useState(null); var undo=uh[0],setUndo=uh[1]; // geri al

    var now=new Date();
    var mm=useState(now.getMonth()); var month=mm[0],setMonth=mm[1];
    var yy=useState(now.getFullYear()); var year=yy[0],setYear=yy[1];
    var monthKey=year+'-'+month;

    var nE=useState({name:'',amount:'',total:'',recurring:true,day:''}); var newExp=nE[0],setNewExp=nE[1];
    var sf=useState(false); var showAdd=sf[0],setShowAdd=sf[1];
    var ed=useState(null); var editId=ed[0],setEditId=ed[1];
    var edv=useState({}); var editVals=edv[0],setEditVals=edv[1];
    var nS=useState({name:'',value:''}); var newSav=nS[0],setNewSav=nS[1];
    var sa=useState(false); var showAddSav=sa[0],setShowAddSav=sa[1];
    var sAdj=useState({}); var savAdj=sAdj[0],setSavAdj=sAdj[1];

    useEffect(function(){ document.documentElement.className=dark?'dark':''; storage.set('dark-mode',dark); },[dark]);
    useEffect(function(){
      setOneTime(storage.get('fp-onetime')||{});
      var rec=storage.get('fp-recurring'); if(!rec){ rec=seedRecurring(); storage.set('fp-recurring',rec); } setRecurring(rec);
      setPaid(storage.get('fp-paid')||{});
      var sav=storage.get('fp-savings'); if(!sav){ sav=seedSavings(); storage.set('fp-savings',sav); } setSavings(sav);
      setLoading(false);
    },[]);

    function seedRecurring(){
      var sm=now.getMonth(), sy=now.getFullYear();
      var id=0; function nid(){ id++; return Date.now()+id; }
      function mk(name,total,amount,day){ return {id:nid(),name:name,amount:amount,total:total,day:day,startMonth:sm,startYear:sy,endMonth:11,endYear:sy+8}; }
      return [
        // Krediler
        mk('Akbank Kredi',262000,29110,3),
        mk('Akbank Konut Kredisi',492500,30000,3),
        mk('Garanti Kredi',317000,35200,7),
        mk('İş Bankası Kredi',79000,15800,16),
        mk('Albaraka Türk',50000,12500,9),
        // Nakit avans (ayrı sekme)
        mk('Akbank Nakit Hesap',210000,25000,3),
        mk('Enpara Nakit Avans',59000,10000,20),
        // Kartlar
        mk('Akbank Kredi Kartı',85000,12000,23),
        mk('Garanti Kredi Kartı',260000,30000,5),
        mk('Enpara Kredi Kartı',71250,9000,12),
        mk('Garanti Troy Kart',null,5000,13),
        mk('Özüm Kredi Kartı',null,7500,5),
        // Sabit aylık giderler (GERİ GELDİ)
        mk('Ev Aidatı',null,3500,1),
        mk('Ev Kirası',null,36500,1),
        mk('SGK / SSK Primi',null,4500,15),
        mk('Sağlık Sigortası',null,3400,15),
        // EminEvim (ay sonu)
        mk('EminEvim Ev',null,29500,28),
        mk('EminEvim Araba',null,9100,28),
        // Kişiler
        mk('Murat',82500,10000,2),
        mk('Teyzem',190900,15000,2)
      ];
    }
    function seedSavings(){
      return [ {id:Date.now()+1, name:'Altın', value:0, note:'gram / çeyrek — güncel değerini gir'}, {id:Date.now()+2, name:'Nakit Birikim', value:0, note:''} ];
    }
    function save(k,d,setter){ setter(d); storage.set(k,d); }

    var getMonthExp=useCallback(function(y,m){
      var ot=oneTime[y+'-'+m]||[]; var mn=monthNum(y,m);
      var rec=recurring.filter(function(x){return mn>=monthNum(x.startYear,x.startMonth)&&mn<=monthNum(x.endYear,x.endMonth);});
      return ot.map(function(x){return Object.assign({},x,{isRec:false});}).concat(rec.map(function(x){return Object.assign({},x,{isRec:true});}));
    },[oneTime,recurring]);

    var allExp=getMonthExp(year,month);
    var paidKeys=paid[monthKey]||[];
    function isPaid(id,isRec){ return paidKeys.indexOf((isRec?'r-':'o-')+id)>-1; }

    function paidMonthsCount(recId){ var cnt=0; Object.keys(paid).forEach(function(mk){ if((paid[mk]||[]).indexOf('r-'+recId)>-1) cnt++; }); return cnt; }
    function currentRemaining(x){ if(x.total==null) return null; return Math.max(0, x.total - paidMonthsCount(x.id)*x.amount); }
    // Geçen aya kadar ödenmiş (bu ay hariç) — "diğer ay düşülmüş" görünümü için
    function remainingBeforeThisMonth(x){
      if(x.total==null) return null;
      var cnt=0; var curNum=monthNum(year,month);
      Object.keys(paid).forEach(function(mk){
        var parts=mk.split('-'); var num=monthNum(parseInt(parts[0]),parseInt(parts[1]));
        if(num<curNum && (paid[mk]||[]).indexOf('r-'+x.id)>-1) cnt++;
      });
      return Math.max(0, x.total - cnt*x.amount);
    }

    function groupOf(name){ var c=classify(name); if(c==='loan')return 'loan'; if(c==='cash')return 'cash'; if(c==='card')return 'card'; if(c==='fixed')return 'fixed'; return 'person'; }
    var groups={
      loan: allExp.filter(function(x){return groupOf(x.name)==='loan';}),
      cash: allExp.filter(function(x){return groupOf(x.name)==='cash';}),
      card: allExp.filter(function(x){return groupOf(x.name)==='card';}),
      fixed: allExp.filter(function(x){return groupOf(x.name)==='fixed';}),
      person: allExp.filter(function(x){return groupOf(x.name)==='person';})
    };
    var totalExp=allExp.reduce(function(a,x){return a+x.amount;},0);
    var paidExp=allExp.filter(function(x){return isPaid(x.id,x.isRec);}).reduce(function(a,x){return a+x.amount;},0);
    var unpaidExp=totalExp-paidExp;
    function gUnpaid(arr){ return arr.filter(function(x){return !isPaid(x.id,x.isRec);}).reduce(function(a,x){return a+x.amount;},0); }
    function gTotal(arr){ return arr.reduce(function(a,x){return a+x.amount;},0); }

    var totalRemainingDebt = recurring.reduce(function(a,x){ if(groupOf(x.name)==='fixed'||x.total==null) return a; var r=currentRemaining(x); return a+(r||0); },0);
    var savingsTotal = savings.reduce(function(a,s){ return a+(Number(s.value)||0); },0);

    var chartData=useMemo(function(){
      var arr=[];
      for(var i=5;i>=0;i--){ var m=now.getMonth()-i,y=now.getFullYear(); while(m<0){m+=12;y--;} arr.push({label:M3[m],value:getMonthExp(y,m).reduce(function(a,x){return a+x.amount;},0)}); }
      return arr;
    },[getMonthExp]);

    function addExp(){
      if(!newExp.name||!newExp.amount) return; vibrate();
      if(newExp.recurring){
        save('fp-recurring', recurring.concat([{id:Date.now(),name:newExp.name,amount:parseFloat(newExp.amount),total:newExp.total?parseFloat(newExp.total):null,day:parseInt(newExp.day)||1,startMonth:month,startYear:year,endMonth:11,endYear:year+8}]), setRecurring);
      } else {
        var cur=oneTime[monthKey]||[]; var o={}; o[monthKey]=cur.concat([{id:Date.now(),name:newExp.name,amount:parseFloat(newExp.amount),day:parseInt(newExp.day)||1}]);
        save('fp-onetime', Object.assign({},oneTime,o), setOneTime);
      }
      setNewExp({name:'',amount:'',total:'',recurring:true,day:''}); setShowAdd(false);
    }
    function togglePaid(id,isRec,name){
      vibrate(); var key=(isRec?'r-':'o-')+id; var cur=paid[monthKey]||[];
      var wasPaid=cur.indexOf(key)>-1;
      var nv=wasPaid?cur.filter(function(k){return k!==key;}):cur.concat([key]);
      var o=Object.assign({},paid); o[monthKey]=nv; save('fp-paid',o,setPaid);
      // geri al kaydı
      setUndo({type:'pay', prev:cur.slice(), monthKey:monthKey, label:(wasPaid?'İşaret kaldırıldı':'Ödendi')+': '+name});
      setTimeout(function(){ setUndo(function(u){ return (u&&u.label && u.label.indexOf(name)>-1)?null:u; }); }, 5000);
    }
    function doUndo(){
      if(!undo) return; vibrate(15);
      if(undo.type==='pay'){ var o=Object.assign({},paid); o[undo.monthKey]=undo.prev; save('fp-paid',o,setPaid); }
      if(undo.type==='delete'){ if(undo.isRec) save('fp-recurring', undo.list, setRecurring); else save('fp-onetime', undo.list, setOneTime); }
      setUndo(null);
    }
    function delExp(id,isRec,name){
      vibrate(20);
      if(isRec){ var prev=recurring.slice(); save('fp-recurring',recurring.filter(function(x){return x.id!==id;}),setRecurring); setUndo({type:'delete',isRec:true,list:prev,label:'Silindi: '+name}); }
      else { var cur=oneTime[monthKey]||[]; var prevO=Object.assign({},oneTime); var o=Object.assign({},oneTime); o[monthKey]=cur.filter(function(x){return x.id!==id;}); save('fp-onetime',o,setOneTime); setUndo({type:'delete',isRec:false,list:prevO,label:'Silindi: '+name}); }
      setTimeout(function(){ setUndo(function(u){ return (u&&u.label.indexOf(name)>-1)?null:u; }); }, 6000);
    }
    function openEdit(x){ vibrate(5); setEditId((x.isRec?'r-':'o-')+x.id); setEditVals({name:x.name,amount:String(x.amount),total:x.total!=null?String(x.total):'',day:x.day?String(x.day):''}); }
    function saveEdit(x){
      vibrate();
      if(x.isRec){ save('fp-recurring', recurring.map(function(r){ return r.id===x.id?Object.assign({},r,{name:editVals.name,amount:parseFloat(editVals.amount)||0,total:editVals.total!==''?parseFloat(editVals.total):r.total,day:parseInt(editVals.day)||r.day}):r; }), setRecurring); }
      else { var cur=oneTime[monthKey]||[]; var o=Object.assign({},oneTime); o[monthKey]=cur.map(function(r){ return r.id===x.id?Object.assign({},r,{name:editVals.name,amount:parseFloat(editVals.amount)||0,day:parseInt(editVals.day)||r.day}):r; }); save('fp-onetime',o,setOneTime); }
      setEditId(null);
    }
    function prevMonth(){ vibrate(5); if(month===0){setMonth(11);setYear(year-1);}else setMonth(month-1); }

              e('button',{onClick:function(){adjSav(s.id,1);},style:Object.assign({},S.adjBtn,{background:'var(--green)'})},'+'),
              e('button',{onClick:function(){adjSav(s.id,-1);},style:Object.assign({},S.adjBtn,{background:'var(--red)'})},'−')
            )
          );
        }),
        showAddSav ? e('div',{style:S.addForm},
          e('input',{type:'text',placeholder:'Birikim adı (örn. Çeyrek Altın)',value:newSav.name,onChange:function(ev){setNewSav(Object.assign({},newSav,{name:ev.target.value}));},style:S.input}),
          e('div',{style:{display:'flex',gap:8,marginTop:8}},
            e('input',{type:'number',inputMode:'decimal',placeholder:'Başlangıç değeri ₺',value:newSav.value,onChange:function(ev){setNewSav(Object.assign({},newSav,{value:ev.target.value}));},style:Object.assign({},S.input,{flex:1})}),
            e('button',{onClick:addSav,style:Object.assign({},S.primaryBtn,{background:'var(--gold)'})},'Ekle')
          ),
          e('button',{onClick:function(){setShowAddSav(false);},style:Object.assign({},S.ghostBtn,{width:'100%',marginTop:8})},'Vazgeç')
        ) : e('button',{onClick:function(){setShowAddSav(true);},style:S.addFab},'+ Birikim Ekle')
      );
    }

    return e('div',{style:S.app},
      e('header',{style:S.header},
        e('div',null, e('h1',{style:S.logo},'Finans',e('span',{style:{color:'var(--gold)'}},'Pro')), e('p',{style:S.headerDate}, MONTHS[now.getMonth()]+' '+now.getFullYear()+', '+now.getDate())),
        e('button',{onClick:function(){setDark(!dark);},style:S.themeBtn}, dark?'☀️':'🌙')
      ),
      e('main',{style:S.main}, content),
      // GERİ AL şeridi
      undo ? e('div',{style:S.undoBar},
        e('span',{style:{fontSize:13,color:'#fff',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, undo.label),
        e('button',{onClick:doUndo,style:S.undoBtn},'↶ Geri Al')
      ) : null,
      e('nav',{style:S.tabBar},
        [{id:'expenses',icon:'📋',label:'Ödemeler'},{id:'cash',icon:'🏦',label:'Nakit Avans'},{id:'debts',icon:'🤝',label:'Borçlar'}].map(function(it){
          var on=tab===it.id;
          return e('button',{key:it.id,onClick:function(){vibrate(5);setTab(it.id);setShowAdd(false);setShowAddSav(false);setEditId(null);},style:Object.assign({},S.tabItem,on?{color:'var(--text)'}:{})},
            e('span',{style:{fontSize:20,opacity:on?1:0.5,filter:on?'none':'grayscale(0.5)'}},it.icon),
            e('span',{style:Object.assign({},S.tabLabel,on?{fontWeight:700,color:'var(--text)'}:{})},it.label)
          );
        })
      )
    );
  }
